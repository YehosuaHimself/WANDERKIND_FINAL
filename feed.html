<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Wanderkind — Feed</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FAFAF5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/seal.svg" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://gjzhwpzgvdpkflgjesmb.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    html, body { background: var(--wk-bg); color: var(--wk-ink); height: 100svh; height: 100dvh; overflow-x: hidden; overflow-y: auto; }
    body { overscroll-behavior-y: contain; padding: 0; }
    [data-pwa="true"] [data-only="browser"] { display: none; }
    .browser-mode-hint { max-width: 480px; margin: 12px auto 0; background: rgba(200,118,42,0.08); border: 1px solid var(--wk-amber-line); border-radius: var(--wk-r-md); padding: 12px var(--wk-space-md); }
    .bmh-eyebrow { display: block; font-family: var(--wk-font-mono); font-size: var(--wk-fs-nano); letter-spacing: var(--wk-ls-mono-wide); text-transform: uppercase; color: var(--wk-amber-text); font-weight: 700; margin-bottom: 4px; }
    .bmh-body { font-size: var(--wk-fs-small); line-height: var(--wk-lh-body); color: var(--wk-ink-soft); margin: 0; }
    main#feed-root { max-width: 480px; margin: 0 auto; padding: max(var(--wk-space-md), env(safe-area-inset-top)) var(--wk-page-x) calc(var(--wk-tabbar-h) + env(safe-area-inset-bottom) + 30px); display: flex; flex-direction: column; gap: var(--wk-space-md); }
    .f-eyebrow { font-family: var(--wk-font-mono); font-size: var(--wk-fs-mono); letter-spacing: 0.30em; text-transform: uppercase; color: var(--wk-amber-text); font-weight: 700; padding-bottom: 8px; border-bottom: 1px solid var(--wk-line); }
    .f-eyebrow::before { content: "— "; color: var(--wk-amber); }
    .f-title { font-family: var(--wk-font-display); font-weight: 900; font-size: 30px; letter-spacing: -0.02em; line-height: 0.95; margin: 0; color: var(--wk-ink); }
    .f-title em { color: var(--wk-amber-text); font-style: italic; }
    .f-post { background: var(--wk-bg-elevated); border: 1px solid var(--wk-line); border-radius: var(--wk-r-md); overflow: hidden; }
    .f-post-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .f-post-av { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, var(--wk-amber-hi), var(--wk-amber) 60%, var(--wk-amber-press)); color: var(--wk-bg); display: grid; place-items: center; font-family: var(--wk-font-display); font-weight: 900; font-size: 12px; }
    .f-post-name { font-family: var(--wk-font-display); font-weight: 700; font-size: 13.5px; color: var(--wk-ink); }
    .f-post-meta { font-family: var(--wk-font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--wk-ink-muted); text-transform: uppercase; margin-top: 1px; }
    .f-post-body { padding: 0 14px 12px; }
    .f-post-body p { font-family: var(--wk-font-display); font-size: 14.5px; line-height: 1.6; color: var(--wk-ink); margin: 0; font-style: italic; }
    .f-post-tag { display: inline-block; margin: 8px 14px 0; font-family: var(--wk-font-mono); font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--wk-amber-text); font-weight: 700; }
    .f-post-tag.road { color: var(--wk-ink-muted); }
    .f-post-tag::before { content: "+ "; color: var(--wk-amber); }
    .f-post-tag.road::before { content: "✦ "; }
    .f-post-act { display: flex; gap: 16px; padding: 8px 14px 14px; }
    .f-post-act-btn { font-family: var(--wk-font-mono); font-size: 11px; letter-spacing: 0.15em; color: var(--wk-ink-soft); background: transparent; border: 0; cursor: pointer; font-weight: 700; }
    .f-post-act-btn.heart.on { color: var(--wk-amber-text); }
    .f-empty { background: var(--wk-bg-2); border: 1px solid var(--wk-line); border-radius: var(--wk-r-md); padding: 32px 22px; text-align: center; }
    .f-empty-h { font-family: var(--wk-font-display); font-weight: 700; font-size: 15px; color: var(--wk-ink); margin: 0 0 6px; }
    .f-empty-b { font-family: var(--wk-font-display); font-size: 13px; color: var(--wk-ink-soft); line-height: 1.5; margin: 0; }
  </style>
</head>
<body>
  <a href="#feed-root" class="skip-to-content">Skip to feed</a>
  <aside class="browser-mode-hint" data-only="browser" role="status">
    <span class="bmh-eyebrow">— Browser mode</span>
    <p class="bmh-body">You're in Safari. <strong>Open Wanderkind from your home screen</strong> for the full app experience.</p>
  </aside>
  <main id="feed-root">
    <h2 class="f-eyebrow">— The Way · public</h2>
    <div>
      <h1 class="f-title">The <em>feed.</em></h1>
    </div>
    <section id="feed-list"></section>
    <section class="f-empty" id="feed-empty" hidden>
      <h3 class="f-empty-h">No posts yet.</h3>
      <p class="f-empty-b">When walkers seal stamps or post from the road, they land here. The feed is proof the movement breathes.</p>
    </section>
  </main>
  <wk-tabbar></wk-tabbar>
  <script type="module" src="/js/pwa-mode.js"></script>
  <script type="module" src="/js/sw-register.js"></script>
  <script type="module" src="/js/simple-mode.js"></script>
  <script type="module" src="/js/wk-tabbar.js"></script>
  <script type="module" src="/js/feed.js"></script>
</body>
</html>
