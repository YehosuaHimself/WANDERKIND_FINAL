<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>Wanderkind — My Pass</title>
  <meta name="description" content="The passport card — your trail name, your stamps, your story." />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FAFAF5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/seal.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob:;
    font-src 'self';
    connect-src 'self' https://gjzhwpzgvdpkflgjesmb.supabase.co;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  " />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/components.css" />

  <style>
    html, body { background: var(--wk-bg); color: var(--wk-ink); }
    body { min-height: 100vh; min-height: 100dvh; padding: 0; }

    main.placeholder {
      max-width: 460px;
      margin: 0 auto;
      padding:
        max(var(--wk-space-md), env(safe-area-inset-top))
        var(--wk-page-x)
        calc(var(--wk-tabbar-h) + env(safe-area-inset-bottom) + 16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--wk-space-md);
      text-align: center;
      min-height: calc(100dvh - var(--wk-tabbar-h));
    }
    .ph-seal {
      width: 80px; height: 80px; color: var(--wk-amber);
      animation: ph-pulse 3.5s ease-in-out infinite;
    }
    @keyframes ph-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(200,118,42,0.18)); }
      50%      { filter: drop-shadow(0 0 14px rgba(200,118,42,0.35)); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ph-seal { animation: none; }
    }
    .ph-eyebrow {
      font-family: var(--wk-font-mono);
      font-size: var(--wk-fs-micro);
      letter-spacing: var(--wk-ls-mono-wide);
      text-transform: uppercase;
      color: var(--wk-amber-text);
      font-weight: var(--wk-fw-bold);
    }
    .ph-title {
      font-family: var(--wk-font-display);
      font-weight: var(--wk-fw-black);
      font-size: clamp(1.5rem, 4vw + 0.5rem, 2rem);
      letter-spacing: var(--wk-ls-display);
      line-height: var(--wk-lh-tight);
      text-transform: uppercase;
      color: var(--wk-ink);
      margin: 0;
    }
    .ph-sub {
      color: var(--wk-ink-soft);
      font-size: var(--wk-fs-small);
      line-height: var(--wk-lh-body);
      max-width: 380px;
    }
    .ph-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--wk-font-display);
      font-weight: var(--wk-fw-bold);
      font-size: var(--wk-fs-small);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--wk-ink);
      text-decoration: none;
      padding: 12px 18px;
      border: 1px solid var(--wk-line);
      border-radius: var(--wk-r-sm);
      margin-top: var(--wk-space-md);
    }
    .ph-back:hover, .ph-back:focus-visible {
      color: var(--wk-amber-text);
      border-color: var(--wk-amber-text);
      outline: none;
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-to-content">Skip to content</a>

  <main class="placeholder" id="main">
    <img class="ph-seal" src="/assets/icons/seal.svg" alt="" width="80" height="80" />
    <span class="ph-eyebrow">— Coming soon</span>
    <h1 class="ph-title">My Pass</h1>
    <p class="ph-sub">A full-bleed view of your Wanderkind pass: tier, stamps gallery, statistics, and the share-your-pass QR. Shipping with the stamp issuance mechanic.</p>
    <a href="/more.html" class="ph-back">← Back to More</a>
  </main>

  <wk-tabbar></wk-tabbar>

  <script type="module" src="/js/pwa-mode.js"></script>
  <script type="module" src="/js/sw-register.js"></script>
  <script type="module" src="/js/wk-tabbar.js"></script>
</body>
</html>
