<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Wanderkind — Stamps</title>
  <meta name="description" content="The stamps you collect from hosts along the way." />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FAFAF5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/seal.svg" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob:;
    font-src 'self';
    connect-src 'self' https://gjzhwpzgvdpkflgjesmb.supabase.co;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  " />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    html, body { background: var(--wk-bg); color: var(--wk-ink); }
    body { min-height: 100vh; min-height: 100dvh; padding: 0; }
    main.placeholder {
      max-width: 460px;
      margin: 0 auto;
      padding:
        max(var(--wk-space-md), env(safe-area-inset-top))
        var(--wk-page-x)
        calc(var(--wk-tabbar-h) + env(safe-area-inset-bottom) + 16px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: var(--wk-space-md);
      text-align: center;
      min-height: calc(100dvh - var(--wk-tabbar-h));
    }
    .ph-seal { width: 80px; height: 80px; color: var(--wk-amber); }
    .ph-eyebrow {
      font-family: var(--wk-font-mono); font-size: var(--wk-fs-micro);
      letter-spacing: var(--wk-ls-mono-wide); text-transform: uppercase;
      color: var(--wk-amber-text); font-weight: var(--wk-fw-bold);
    }
    .ph-title {
      font-family: var(--wk-font-display); font-weight: var(--wk-fw-black);
      font-size: clamp(1.5rem, 4vw + 0.5rem, 2rem);
      letter-spacing: var(--wk-ls-display); line-height: var(--wk-lh-tight);
      text-transform: uppercase; color: var(--wk-ink); margin: 0;
    }
    .ph-sub {
      color: var(--wk-ink-soft); font-size: var(--wk-fs-small);
      line-height: var(--wk-lh-body); max-width: 380px;
    }
    .ph-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--wk-font-display); font-weight: var(--wk-fw-bold);
      font-size: var(--wk-fs-small); letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--wk-ink);
      text-decoration: none; padding: 12px 18px;
      border: 1px solid var(--wk-line); border-radius: var(--wk-r-sm);
    }
  

    /* ── Browser-mode hint (data-only=browser) ──────────────────── */
    .browser-mode-hint {
      max-width: 460px;
      margin: 0 auto;
      background: rgba(200,118,42,0.08);
      border: 1px solid var(--wk-amber-line);
      border-radius: var(--wk-r-md);
      padding: 12px var(--wk-space-md);
      margin-top: var(--wk-space-sm);
    }
    .bmh-eyebrow {
      display: block;
      font-family: var(--wk-font-mono);
      font-size: var(--wk-fs-nano);
      letter-spacing: var(--wk-ls-mono-wide);
      text-transform: uppercase;
      color: var(--wk-amber-text);
      font-weight: var(--wk-fw-bold);
      margin-bottom: 4px;
    }
    .bmh-body {
      font-size: var(--wk-fs-small);
      line-height: var(--wk-lh-body);
      color: var(--wk-ink-soft);
      margin: 0;
    }
    .bmh-body strong { color: var(--wk-ink); font-weight: var(--wk-fw-bold); }


  </style>
</head>
<body>
  <!-- Shows ONLY when the page is in a regular browser, not the installed PWA. -->
  <aside class="browser-mode-hint" data-only="browser" role="status">
    <span class="bmh-eyebrow">— Browser mode</span>
    <p class="bmh-body">You're in Safari. <strong>Open Wanderkind from your home screen</strong> for the full app experience.</p>
  </aside>


  <main class="placeholder" id="stamps-root">
    <svg class="ph-seal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="9"/>
      <circle cx="12" cy="12" r="4" fill="currentColor" fill-opacity="0.15"/>
    </svg>
    <div class="ph-eyebrow">— Stamps</div>
    <h1 class="ph-title">A stamp for every door</h1>
    <p class="ph-sub">Each Wanderkind host you stay with leaves one stamp on your Pass. The page that shows them all is coming next.</p>
    <a href="/more.html" class="ph-back">← Back to More</a>
  </main>
  <wk-tabbar></wk-tabbar>
  <script type="module" src="/js/pwa-mode.js"></script>
  <script type="module" src="/js/sw-register.js"></script>
  <script type="module" src="/js/wk-tabbar.js"></script>
</body>
</html>
