<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-light: #FAFAF5;
            --bg-white: #FFFFFF;
            --text-primary: #1A120A;
            --text-secondary: #6B5A3E;
            --text-muted: rgba(26, 18, 10, 0.5);
            --amber: #C8762A;
            --accent: #C8762A;
            --border-light: rgba(200, 118, 42, 0.12);
            --border-subtle: rgba(200, 118, 42, 0.2);
            --overlay-dark: rgba(26, 18, 10, 0.85);
            --shadow-light: 0 2px 12px rgba(26, 18, 10, 0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg-light);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            overflow-x: hidden;
        }

        body {
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Controls */
        .controls {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-box {
            position: relative;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-white);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box input:focus {
            outline: none;
            background: var(--bg-white);
            border-color: var(--amber);
            box-shadow: 0 0 20px rgba(200, 118, 42, 0.15);
        }

        /* Filter chips */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-chip {
            padding: 8px 16px;
            background: #F5F1E8;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .filter-chip:hover {
            background: #EDE6D9;
            border-color: var(--amber);
            color: var(--text-primary);
        }

        .filter-chip.active {
            background: var(--amber);
            color: var(--bg-white);
            border-color: var(--amber);
        }

        /* Grid */
        .personas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .persona-card {
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-light);
        }

        .persona-card:hover {
            transform: translateY(-8px);
            border-color: var(--amber);
            box-shadow: 0 12px 28px rgba(26, 18, 10, 0.12);
        }

        .persona-photo {
            width: 100%;
            height: 280px;
            background: #F0E8DC;
            overflow: hidden;
            position: relative;
        }

        .persona-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.05) saturate(1.1);
        }

        .persona-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .persona-header {
            margin-bottom: 16px;
        }

        .persona-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .persona-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .persona-archetype {
            display: inline-block;
            font-size: 0.75rem;
            padding: 4px 10px;
            background: #FEF3E8;
            border-radius: 12px;
            color: var(--amber);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 12px;
        }

        .persona-quote {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 16px;
            line-height: 1.5;
            flex: 1;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }

        .stat {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        .stat-visual {
            display: flex;
            gap: 3px;
            height: 6px;
        }

        .stat-pip {
            flex: 1;
            background: #E8DFD0;
            border-radius: 2px;
        }

        .stat-pip.filled {
            background: var(--amber);
        }

        .expand-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay-dark);
            backdrop-filter: blur(4px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .modal-content {
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
            box-shadow: 0 20px 60px rgba(26, 18, 10, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            padding: 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .modal-photo {
            width: 120px;
            height: 160px;
            border-radius: 8px;
            overflow: hidden;
        }

        .modal-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.05) saturate(1.1);
        }

        .modal-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .modal-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .modal-meta {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .modal-occupations {
            font-size: 0.9rem;
            color: var(--amber);
            font-weight: 600;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-section {
            margin-bottom: 24px;
        }

        .modal-section:last-child {
            margin-bottom: 0;
        }

        .modal-section-title {
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--amber);
            margin-bottom: 12px;
        }

        .modal-section-content {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .bullet-list {
            list-style: none;
            padding: 0;
        }

        .bullet-list li {
            padding-left: 16px;
            margin-bottom: 8px;
            position: relative;
            color: var(--text-primary);
        }

        .bullet-list li:before {
            content: "▪";
            position: absolute;
            left: 0;
            color: var(--amber);
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }

        .device-item {
            padding: 8px 12px;
            background: #FEF3E8;
            border-radius: 6px;
            color: var(--text-primary);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #F5F1E8;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: var(--amber);
            color: var(--bg-white);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer-text {
            margin-bottom: 8px;
        }

        .footer-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results-title {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .personas-grid {
                grid-template-columns: 1fr;
            }

            .modal-header {
                grid-template-columns: 100px 1fr;
                padding: 20px;
            }

            .modal-photo {
                width: 100px;
                height: 140px;
            }

            .modal-name {
                font-size: 1.5rem;
            }

            .controls {
                flex-direction: column;
            }

            .filters {
                gap: 8px;
            }

            .filter-chip {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }

        /* Print */
        @media print {
            .controls,
            .close-btn,
            .expand-hint,
            .modal {
                display: none !important;
            }

            .persona-card {
                page-break-inside: avoid;
            }
        }
    </style>
</head>

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeFilters();

            document.getElementById('searchInput').addEventListener('input', filterPersonas);
        });

        function initializeFilters() {
            const container = document.getElementById('filterContainer');
            allTags.forEach(tag => {
                const chip = document.createElement('button');
                chip.className = 'filter-chip';
                chip.textContent = tag;
                chip.dataset.tag = tag;
                chip.addEventListener('click', function() {
                    this.classList.toggle('active');
                    filterPersonas();
                });
                container.appendChild(chip);
            });
        }

        function filterPersonas() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeFilters = Array.from(document.querySelectorAll('.filter-chip.active'))
                .map(chip => chip.dataset.tag);

            const filtered = personas.filter(persona => {
                const matchesSearch = persona.keywords.toLowerCase().includes(searchTerm);
                const matchesFilters = activeFilters.length === 0 ||
                    activeFilters.some(filter => persona.tags.includes(filter));
                return matchesSearch && matchesFilters;
            });

            renderPersonas(filtered);
            document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
        }

                    <div class="modal-section">
                        <div class="modal-section-title">Biography</div>
                        <div class="modal-section-content">${persona.bio}</div>
                    </div>

                    <div class="modal-section">
                        <div class="modal-section-title">Goals · What they want from WANDERKIND</div>
                        <ul class="bullet-list">
                            ${persona.goals.map(g => `<li>${g}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="modal-section">
                        <div class="modal-section-title">Frustrations · What blocks them</div>
                        <ul class="bullet-list">
                            ${persona.frustrations.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="modal-section">
                        <div class="modal-section-title">Key Features</div>
                        <div class="modal-section-content">${featuresList}</div>
                    </div>

                    <div class="modal-section">
                        <div class="modal-section-title">Profile Details</div>
                        <div class="devices-grid">
                            <div class="device-item"><strong>Digital Fluency:</strong> ${persona.digitalFluency}/5</div>
                            <div class="device-item"><strong>Travel Experience:</strong> ${persona.travelExperience}/5</div>
                            <div class="device-item"><strong>Budget Level:</strong> ${persona.budgetLevel}/5</div>
                            <div class="device-item"><strong>Device:</strong> ${persona.device}</div>
                        </div>
                    </div>

                    <div class="modal-section">
                        <div class="modal-section-title">Usage Pattern</div>
                        <div class="modal-section-content">${persona.usagePattern}</div>
                    </div>

                    <div class="modal-section">
                        <div class="modal-section-title">Categories</div>
                        <div class="modal-section-content">${persona.tags.join(' · ')}</div>
                    </div>
                </div>
            `;

            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function setGenerationDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date().toLocaleDateString('en-US', options);
            document.getElementById('generationDate').textContent = `Generated ${date}`;
        }
    </script>
<script type="module" src="/js/motion.js"></script>
</body>
</html>
