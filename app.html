<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>Wanderkind — Every Way begins at your door</title>
  <meta name="description" content="A trusting community of wanderers. Walk anywhere. Be welcomed." />

  <!-- Open Graph -->
  <meta property="og:title" content="Wanderkind — Every Way begins at your door" />
  <meta property="og:description" content="A trusting community of wanderers. Walk anywhere. Be welcomed." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wanderkind.love" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Theme -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FAFAF5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0B0705" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wanderkind" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/seal.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="/assets/icons/favicon.ico" />

  <!-- Strict CSP — no third-party JS, no inline eval, no remote fonts -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https://*.supabase.co;
    font-src 'self';
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
    frame-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  " />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/components.css" />

  <style>
    /* /app.html — minimal signed-in / signed-out shell. The pattern
       (seal · eyebrow · headline · actions) is the bones of every
       in-app page; extract to a shared .stack-page in components.css
       when /me.html lands. */
    body { background: var(--wk-bg); }
    .app-signed {
      max-width: 460px;
      margin: 0 auto;
      padding:
        max(var(--wk-space-2xl), env(safe-area-inset-top))
        var(--wk-page-x)
        max(var(--wk-space-2xl), env(safe-area-inset-bottom));
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: var(--wk-space-md);
    }
    .app-seal {
      animation: app-glow 4s ease-in-out infinite;
    }
    @keyframes app-glow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(200,118,42,0.15)); }
      50%      { filter: drop-shadow(0 0 12px rgba(200,118,42,0.35)); }
    }
    .app-signed .eyebrow {
      color: var(--wk-amber-text);
    }
    .app-greeting {
      font-family: var(--wk-font-display);
      font-weight: var(--wk-fw-black);
      font-size: clamp(1.625rem, 4vw + 1rem, 2.25rem);
      letter-spacing: var(--wk-ls-display);
      line-height: var(--wk-lh-tight);
      text-transform: uppercase;
      color: var(--wk-ink);
      margin: 0;
      max-width: 380px;
    }
    .app-greeting em {
      font-style: normal;
      color: var(--wk-amber-text);
    }
    .app-email {
      font-family: var(--wk-font-mono);
      font-size: var(--wk-fs-small);
      color: var(--wk-ink-soft);
      letter-spacing: 0.02em;
      word-break: break-all;
      max-width: 320px;
    }
    .app-hint {
      color: var(--wk-ink-soft);
      max-width: 360px;
      font-size: var(--wk-fs-small);
      line-height: var(--wk-lh-body);
    }
    .app-actions {
      display: flex;
      flex-direction: column;
      gap: var(--wk-space-sm);
      width: 100%;
      max-width: 320px;
      margin-top: var(--wk-space-sm);
    }
    .btn-amber, .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: var(--wk-button-min);
      font-family: var(--wk-font-display);
      font-weight: var(--wk-fw-bold);
      font-size: var(--wk-fs-small);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: var(--wk-r-sm);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-amber {
      background: var(--wk-amber-text);   /* 6.7:1 on cream — AA */
      color: var(--wk-bg);
      border: none;
    }
    .btn-amber:hover, .btn-amber:focus-visible {
      background: var(--wk-amber-press);
    }
    .btn-amber:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(200,118,42,0.35);
    }
    .btn-ghost {
      background: transparent;
      color: var(--wk-ink);
      border: 1px solid var(--wk-line);
    }
    .btn-ghost:hover, .btn-ghost:focus-visible {
      border-color: var(--wk-amber-text);
      color: var(--wk-amber-text);
      outline: none;
    }
  </style>
</head>
<body>

  <a href="#app" class="skip-to-content">Skip to content</a>

  <main id="app">
    <noscript>
      <p style="padding:32px;text-align:center;font-family:'Helvetica Neue',Helvetica,sans-serif;">
        Wanderkind needs JavaScript. Enable it and reload.
      </p>
    </noscript>

    <section class="boot" aria-labelledby="boot-h1">
      <h1 id="boot-h1" class="sr-only">Wanderkind — Every Way begins at your door</h1>
      <img class="boot-seal" src="/assets/icons/seal.svg" alt="Wanderkind seal" width="80" height="80" style="color: var(--wk-amber)" aria-hidden="true" />
      <p class="boot-mantra" aria-hidden="true">— Wanderkind</p>
      <p class="boot-line" aria-hidden="true">Every Way begins at your door.</p>
    </section>
  </main>

  <script type="module" src="/js/sw-register.js"></script>
<script type="module" src="/js/motion.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
