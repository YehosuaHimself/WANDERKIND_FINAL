<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Wanderkind">
  <!-- Icon-optimised W seal · no noise filter, thicker strokes so it
       reads cleanly at 16×16 favicon size. Matches the master seal.svg
       in geometry; the noise pass is reserved for in-page display. -->
  <g transform="rotate(-2.2 40 40)">
    <!-- Outer ring (canonical stamp frame) -->
    <circle cx="40" cy="40" r="37" fill="none" stroke="currentColor" stroke-width="2.0"/>
    <!-- Inner ring (double-ring impression) -->
    <circle cx="40" cy="40" r="33" fill="none" stroke="currentColor" stroke-width="1.0" opacity="0.7"/>
    <!-- The W glyph — geometric, four strokes meeting at apex -->
    <path d="M 22 30 L 30 53 L 36 39 L 40 50 L 44 39 L 50 53 L 58 30"
          fill="none" stroke="currentColor" stroke-width="3.0"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
