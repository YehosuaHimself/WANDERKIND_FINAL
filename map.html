<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />

  <title>Wanderkind — Map</title>
  <meta name="description" content="A map of doors. Beds, food, water, churches, mountains, festivals — and the wanderkinder walking right now." />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FAFAF5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0B0705" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/seal.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://gjzhwpzgvdpkflgjesmb.supabase.co;
    font-src 'self';
    connect-src 'self' https://*.supabase.co https://*.basemaps.cartocdn.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  " />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/vendor/leaflet.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/typography.css" />
  <link rel="stylesheet" href="/css/components.css" />

  <style>
    /* ────────────────────────────────────────────────────────────
       Wanderkind Map · v3 · clean flex layout
       ────────────────────────────────────────────────────────────
       Vertical stack: topbar · chip-strip · map-canvas (fills) · tabbar.
       The map is the dominant surface — every other element is thin.
       Empty-state is a 280px floating pill at the bottom of the map.
       Legend hidden on phones, visible on desktop. */

    html, body {
      background: var(--wk-bg);
      color: var(--wk-ink);
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: contain;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 0;
      margin: 0;
    }

    /* ── Browser-mode hint · floats on top, only outside PWA ── */
    .browser-mode-hint {
      position: fixed;
      top: env(safe-area-inset-top);
      left: 50%; transform: translateX(-50%);
      max-width: 480px;
      width: calc(100% - 24px);
      margin: 12px 0;
      background: rgba(246, 237, 216, 0.92);
      border: 1px solid var(--wk-amber-line);
      border-radius: var(--wk-r-md);
      padding: 10px 14px;
      z-index: 30;
      box-shadow: 0 8px 20px -10px rgba(11,7,5,0.18);
    }
    .bmh-eyebrow {
      display: block;
      font-family: var(--wk-font-mono);
      font-size: var(--wk-fs-nano);
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--wk-amber-text);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .bmh-body {
      font-size: 12.5px;
      line-height: 1.4;
      color: var(--wk-ink-soft);
      margin: 0;
    }
    [data-pwa="true"] .browser-mode-hint { display: none; }

    /* ── Topbar · seal + MAP eyebrow + filter button ── */
    .map-topbar {
      flex: 0 0 auto;
      padding:
        max(var(--wk-space-md), env(safe-area-inset-top))
        var(--wk-page-x)
        var(--wk-space-sm);
      background: var(--wk-bg);
      border-bottom: 1px solid var(--wk-line);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .map-topbar-id {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      grid-column: 2;
    }
    .map-topbar-seal {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--wk-amber);
      display: grid; place-items: center;
      color: var(--wk-amber);
    }
    .map-topbar-seal svg { width: 18px; height: 18px; }
    .map-topbar-label {
      font-family: var(--wk-font-mono);
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--wk-ink);
      font-weight: 700;
    }
    .map-topbar-filter {
      grid-column: 3;
      justify-self: end;
      width: 36px; height: 36px;
      display: grid; place-items: center;
      background: transparent;
      border: none;
      color: var(--wk-ink);
      cursor: pointer;
      border-radius: 50%;
    }
    .map-topbar-filter:hover { background: var(--wk-amber-soft); }
    .map-status {
      grid-column: 1 / -1;
      text-align: center;
      font-family: var(--wk-font-mono);
      font-size: var(--wk-fs-nano);
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--wk-ink-muted);
      margin-top: 4px;
    }

    /* ── Chip strip · horizontal scroll on mobile ── */
    .filter-strip {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px var(--wk-page-x);
      background: var(--wk-bg);
      border-bottom: 1px solid var(--wk-line);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      white-space: nowrap;
      z-index: 9;
    }
    .filter-strip::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--wk-font-mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--wk-ink);
      background: var(--wk-bg-2);
      border: 1px solid var(--wk-line);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .filter-chip[aria-pressed="true"] {
      background: var(--wk-amber);
      color: var(--wk-bg);
      border-color: var(--wk-amber);
    }
    .filter-chip .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
    }
    .filter-chip[data-host="beds"]      .dot { background: #C8762A; }
    .filter-chip[data-host="food"]      .dot { background: #A0522D; }
    .filter-chip[data-host="water"]     .dot { background: #4CA8C9; }
    .filter-chip[data-host="churches"]  .dot { background: #5A4632; }
    .filter-chip[data-host="mountains"] .dot { background: #5C6B40; }
    .filter-chip[data-host="festivals"] .dot { background: #9C2E5C; }
    .filter-chip[data-host="walkers"]   .dot { background: #C8762A; box-shadow: 0 0 0 2px rgba(200,118,42,0.3); }
    .filter-sep {
      flex: 0 0 auto;
      width: 1px; height: 18px;
      background: var(--wk-line);
      align-self: center;
    }

    /* ── Map canvas · fills the remaining space ── */
    .map-canvas {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 40%, #F2E3C0 0%, #E5D2A0 60%, #D4BA82 100%);
      /* leave room for the fixed bottom tabbar */
      padding-bottom: 0;
    }
    #map {
      position: absolute;
      inset: 0;
      bottom: calc(var(--wk-tabbar-h) + env(safe-area-inset-bottom));
      width: 100%;
      background: transparent;
    }
    /* Aged-paper tile filter */
    .wk-tiles {
      filter: sepia(0.38) saturate(0.6) brightness(1.08) contrast(0.95) hue-rotate(-5deg);
      mix-blend-mode: multiply;
    }
    /* Subtle paper grain */
    #map::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(0.6px 0.6px at 13% 27%, rgba(90,70,50,0.16), transparent 60%),
        radial-gradient(0.6px 0.6px at 87% 41%, rgba(90,70,50,0.14), transparent 60%),
        radial-gradient(0.6px 0.6px at 31% 73%, rgba(90,70,50,0.16), transparent 60%),
        radial-gradient(0.6px 0.6px at 67% 91%, rgba(90,70,50,0.14), transparent 60%);
      background-size: 4px 4px, 6px 6px, 5px 5px, 7px 7px;
      opacity: 0.45;
      z-index: 400;
    }

    /* ── Pins ── */
    .wk-region-label { background: transparent !important; border: 0 !important; }
    .wk-pin { background: transparent !important; border: 0 !important; }
    .wk-pin-bg { transition: transform 0.15s ease; }
    .wk-pin:hover .wk-pin-bg { transform: scale(1.08); }
    .wk-walker { background: transparent !important; border: 0 !important; }
    .wk-walker-dot { transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
    .wk-walker--walking .wk-walker-dot {
      animation: walker-pulse 2.4s ease-in-out infinite;
    }
    @keyframes walker-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }
    .wk-walker--self .wk-walker-dot { animation-duration: 1.8s; }
    .wk-footprint { background: transparent !important; border: 0 !important; }
    @media (prefers-reduced-motion: reduce) {
      .wk-walker-dot { animation: none !important; transition: none !important; }
    }

    /* ── Compact empty-state pill · only shown when 0 markers ── */
    .empty-pill {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(var(--wk-tabbar-h) + env(safe-area-inset-bottom) + 12px);
      max-width: 320px;
      width: calc(100% - 32px);
      padding: 10px 16px;
      background: var(--wk-bg-elevated);
      border: 1px solid var(--wk-amber);
      border-radius: var(--wk-r-md);
      box-shadow: 0 8px 20px -10px rgba(11,7,5,0.25);
      text-align: center;
      z-index: 410;
    }
    .empty-pill-eyebrow {
      display: block;
      font-family: var(--wk-font-mono);
      font-size: 9px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--wk-amber-text);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .empty-pill-eyebrow::before { content: "— "; color: var(--wk-amber); }
    .empty-pill-title {
      font-family: var(--wk-font-display);
      font-weight: 700;
      font-size: 13.5px;
      color: var(--wk-ink);
      margin: 0 0 8px;
      line-height: 1.3;
    }
    .empty-pill-cta {
      display: inline-block;
      background: var(--wk-amber);
      color: var(--wk-bg);
      font-family: var(--wk-font-mono);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 999px;
      text-decoration: none;
    }
    .empty-pill[hidden] { display: none; }

    /* ── Legend · desktop only ── */
    .map-legend {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 10px 12px;
      background: rgba(246,237,216,0.92);
      border: 1px solid var(--wk-line);
      border-radius: var(--wk-r-sm);
      box-shadow: 0 4px 10px -6px rgba(11,7,5,0.15);
      z-index: 405;
      font-family: var(--wk-font-mono);
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--wk-ink);
    }
    .map-legend .legend-row {
      display: flex; align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .map-legend .legend-row:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    @media (max-width: 720px) {
      .map-legend { display: none; }
    }

    /* ── Leaflet controls — themed ── */
    .leaflet-control-zoom a {
      background: var(--wk-bg-elevated) !important;
      color: var(--wk-ink) !important;
      border-color: var(--wk-line) !important;
      font-family: var(--wk-font-mono) !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--wk-amber-soft) !important;
    }
    .leaflet-control-attribution {
      background: rgba(246,237,216,0.85) !important;
      color: var(--wk-ink-soft) !important;
      font-family: var(--wk-font-mono) !important;
      font-size: 9px !important;
      letter-spacing: 0.1em;
    }
    .leaflet-control-attribution a {
      color: var(--wk-amber-text) !important;
    }
    .leaflet-popup-content-wrapper {
      border-radius: var(--wk-r-sm) !important;
      background: var(--wk-bg-elevated) !important;
      box-shadow: 0 8px 24px -12px rgba(11,7,5,0.25) !important;
    }
    .leaflet-popup-tip { background: var(--wk-bg-elevated) !important; }
  </style>
</head>
<body>

  <a href="#map" class="skip-to-content">Skip to map</a>

  <aside class="browser-mode-hint" data-only="browser" role="status">
    <span class="bmh-eyebrow">— Browser mode</span>
    <p class="bmh-body">You're in Safari. <strong>Open Wanderkind from your home screen</strong> for the full app experience.</p>
  </aside>

  <header class="map-topbar" role="banner">
    <span aria-hidden="true"></span>
    <div class="map-topbar-id">
      <span class="map-topbar-seal" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M7 9 L9 16 L12 11 L15 16 L17 9"/>
        </svg>
      </span>
      <span class="map-topbar-label">Map</span>
    </div>
    <button class="map-topbar-filter" type="button" aria-label="Filter map">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="7"  x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
        <circle cx="9"  cy="7"  r="2" fill="var(--wk-bg)"/>
        <circle cx="15" cy="12" r="2" fill="var(--wk-bg)"/>
        <circle cx="7"  cy="17" r="2" fill="var(--wk-bg)"/>
      </svg>
    </button>
    <span class="map-status" aria-live="polite">Loading the map…</span>
  </header>

  <nav class="filter-strip" aria-label="Map filters">
    <button class="filter-chip" type="button" aria-pressed="true" data-host="beds">
      <span class="dot" aria-hidden="true"></span>Beds
    </button>
    <button class="filter-chip" type="button" aria-pressed="true" data-host="food">
      <span class="dot" aria-hidden="true"></span>Food
    </button>
    <button class="filter-chip" type="button" aria-pressed="true" data-host="water">
      <span class="dot" aria-hidden="true"></span>Water
    </button>
    <span class="filter-sep" aria-hidden="true"></span>
    <button class="filter-chip" type="button" aria-pressed="true" data-host="churches">
      <span class="dot" aria-hidden="true"></span>Churches
    </button>
    <button class="filter-chip" type="button" aria-pressed="true" data-host="mountains">
      <span class="dot" aria-hidden="true"></span>Mountains
    </button>
    <button class="filter-chip" type="button" aria-pressed="true" data-host="festivals">
      <span class="dot" aria-hidden="true"></span>Festivals
    </button>
    <span class="filter-sep" aria-hidden="true"></span>
    <button class="filter-chip" type="button" aria-pressed="true" data-host="walkers">
      <span class="dot" aria-hidden="true"></span>Walkers
    </button>
  </nav>

  <main class="map-canvas" role="main" aria-label="Map of nearby wanderkinds">
    <div id="map"></div>

    <aside class="map-legend" aria-label="Map legend">
      <div class="legend-row"><span class="legend-dot" style="background:#C8762A"></span>Bed</div>
      <div class="legend-row"><span class="legend-dot" style="background:#A0522D"></span>Food</div>
      <div class="legend-row"><span class="legend-dot" style="background:#4CA8C9"></span>Water</div>
      <div class="legend-row"><span class="legend-dot" style="background:#5A4632"></span>Church</div>
      <div class="legend-row"><span class="legend-dot" style="background:#5C6B40"></span>Mountain</div>
      <div class="legend-row"><span class="legend-dot" style="background:#9C2E5C"></span>Festival</div>
      <div class="legend-row"><span class="legend-dot" style="background:#C8762A;box-shadow:0 0 0 2px rgba(200,118,42,0.4)"></span>Walker</div>
    </aside>

    <section class="empty-pill" id="empty-pill" hidden>
      <span class="empty-pill-eyebrow">Day Zero</span>
      <p class="empty-pill-title">No doors here yet — be the first.</p>
      <a class="empty-pill-cta" href="/install.html">Open your door</a>
    </section>
  </main>

  <wk-tabbar></wk-tabbar>

  <script src="/js/vendor/leaflet.js" defer></script>
  <script type="module" src="/js/map-boot.js"></script>
  <script type="module" src="/js/map-session-aware.js"></script>
  <script type="module" src="/js/pwa-mode.js"></script>
  <script type="module" src="/js/auth-bypass.js"></script>
  <script type="module" src="/js/sw-register.js"></script>
  <script type="module" src="/js/wk-tabbar.js"></script>
</body>
</html>
