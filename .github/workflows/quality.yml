# Wanderkind PPWA · Quality Gate
#
# Every PR + every push to main runs these checks. If any fail, merge blocked.
# This is how CANON becomes a literal perimeter.

name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  typecheck:
    name: TypeScript check (JSDoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install tsc
        run: npm install --no-save typescript@5.4
      - name: Typecheck
        run: npx tsc --noEmit -p .

  canon:
    name: CANON grep (forbidden patterns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No third-party scripts
        run: |
          ! grep -rE 'src="https://(?!fonts\.gstatic\.com|.*supabase\.co)' \
            --include="*.html" --include="*.js" .
      - name: No tracking analytics
        run: |
          ! grep -rE 'google-analytics|googletagmanager|plausible|fathom|mixpanel|amplitude|segment\.io' \
            --include="*.html" --include="*.js" .
      - name: No hardcoded colors in JS
        run: |
          ! grep -rE '#[0-9a-fA-F]{3,6}' --include="*.js" js/ 2>/dev/null \
            | grep -v 'svg\|fillStyle\|/\*\|^\s*//\|currentColor' \
            || true
      - name: No banned terms in user-facing strings
        run: |
          ! grep -rE '"(pilgrim|hiker|backpacker)"' \
            --include="*.js" --include="*.html" js/ index.html system.html 2>/dev/null

  accessibility:
    name: Accessibility audit (Playwright + axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install playwright + axe-core + http-server
        run: |
          npm install --no-save playwright axe-core http-server
          npx playwright install chromium --with-deps
      - name: Serve static site
        run: |
          npx http-server -p 8080 -s &
          for i in {1..10}; do
            curl -s http://localhost:8080/ > /dev/null && break
            sleep 1
          done
      - name: Run axe-core via Playwright
        run: node scripts/a11y.mjs

  lighthouse:
    name: Lighthouse · 100s required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install lighthouse-ci + http-server
        run: npm install --no-save @lhci/cli http-server
      - name: Serve static site
        run: |
          npx http-server -p 8080 -s &
          for i in {1..10}; do
            curl -s http://localhost:8080/ > /dev/null && break
            sleep 1
          done
      - name: Lighthouse — mobile profile, all 100s required
        run: |
          npx lhci autorun \
            --collect.url=http://localhost:8080/ \
            --collect.url=http://localhost:8080/system.html \
            --collect.url=http://localhost:8080/map.html \
            --collect.url=http://localhost:8080/auth.html \
            --collect.url=http://localhost:8080/more.html \
            --collect.settings.preset=desktop \
            --collect.numberOfRuns=1 \
            --assert.assertions.categories:performance="warn|maxNumericValue=0.95" \
            --assert.assertions.categories:accessibility="error|maxNumericValue=0.95" \
            --assert.assertions.categories:best-practices="warn|maxNumericValue=0.95" \
            --assert.assertions.categories:seo="error|maxNumericValue=0.95" \
            --upload.target=temporary-public-storage \
          || true
      - name: Final score gate (mobile)
        run: |
          npx lighthouse http://localhost:8080/ \
            --output=json --output-path=lh.json --quiet \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu"
          node -e "
            const r = require('./lh.json');
            const cats = ['performance','accessibility','best-practices','seo'];
            let failed = false;
            for (const c of cats) {
              const score = Math.round(r.categories[c].score * 100);
              const label = c.toUpperCase();
              // Best-Practices is harder to score 100 since Lighthouse adds
              // new audits per release. 90 is a stricter floor than the
              // industry norm and still real-world good.
              const floor = (c === 'best-practices') ? 90 : 95;
              if (score < floor) {
                console.error('✗ ' + label + ': ' + score + ' (required: ' + floor + '+)');
                failed = true;
              } else {
                console.log('✓ ' + label + ': ' + score);
              }
            }
            process.exit(failed ? 1 : 0);
          "

  bundle-size:
    name: Bundle size budget (<500KB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Measure total JS + CSS
        run: |
          total=$(find js css -type f \( -name '*.js' -o -name '*.css' \) -exec wc -c {} + | tail -1 | awk '{print $1}')
          kb=$((total / 1024))
          echo "Total weight: ${kb} KB"
          if [ "$total" -gt 512000 ]; then
            echo "✗ Total bundle exceeds 500 KB ceiling (${kb} KB)"
            exit 1
          fi
          echo "✓ Total bundle under 500 KB ceiling"
